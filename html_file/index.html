    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #fff;
            width: 320px;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h2 {
            margin: 10px 0 5px;
            font-size: 24px;
        }

        .card p {
            color: #555;
            margin: 5px 0 15px;
            font-size: 15px;
        }

        .links a {
            display: block;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            background: #0073ff;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .links a:hover {
            background: #0059c9;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Nikhil Sabat</h2>
        <p>Python Developer</p>

        <div class="links">
            <a href="https://www.linkedin.com/in/nikhil-sabat-038126300" target="_blank">LinkedIn Profile</a>
            <a href="https://github.com/nick18-glitch" target="_blank">GitHub Profile</a>
        </div>
    </div>

</body>
